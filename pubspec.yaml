name: getaqi
description: "A new Flutter aqi."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  flutter_riverpod:
  http: ^1.6.0
  flutter_inappwebview: ^6.1.5
  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  firebase_core:
  firebase_auth:
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  google_sign_in:
  flutter_svg: ^2.2.3
  cloud_firestore: ^6.1.2
  flutter_launcher_icons: ^0.14.4
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  workmanager:
  sensors_plus: ^7.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/google.svg
flutter_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/app.png"
  image_path_ios: "assets/icons/app.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app.png"
